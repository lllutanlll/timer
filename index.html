<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notion Timer</title>

<style>
body{
  margin:0;
  background:#d8f1ff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#2b3a42;
}

.timer{
  text-align:center;
}

#task{
  font-size:18px;
  margin-bottom:12px;
  opacity:.8;
}

#time{
  font-size:72px;
  font-weight:bold;
  letter-spacing:2px;
}

#status{
  margin-top:10px;
  font-size:14px;
  opacity:.6;
}

#reset{
  margin-top:24px;
  border:none;
  background:white;
  width:42px;
  height:42px;
  border-radius:999px;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:.2s;
}

#reset:hover{
  transform:scale(1.05);
}
</style>
</head>
<body>

<div class="timer">

  <div id="task">作業なし</div>

  <div id="time">00:00:00</div>

  <div id="status">待機中</div>

  <button id="reset">↺</button>

</div>

<script>
const API_URL = "https://notiontimer.vercel.app/api/status";

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");
const taskEl = document.getElementById("task");
const resetBtn = document.getElementById("reset");

let running = false;
let startTime = null;
let elapsed = 0;
let timerInterval = null;

function format(ms){

  const total = Math.floor(ms / 1000);

  const h = String(Math.floor(total / 3600)).padStart(2,"0");
  const m = String(Math.floor((total % 3600) / 60)).padStart(2,"0");
  const s = String(total % 60).padStart(2,"0");

  return `${h}:${m}:${s}`;
}

function updateTimer(){

  elapsed = Date.now() - startTime;

  timeEl.textContent = format(elapsed);
}

function startTimer(){

  if(running) return;

  running = true;

  startTime = Date.now() - elapsed;

  timerInterval = setInterval(updateTimer,1000);

  statusEl.textContent = "作業中";
}

function stopTimer(){

  if(!running) return;

  running = false;

  clearInterval(timerInterval);

  statusEl.textContent = "停止中";
}

resetBtn.addEventListener("click", () => {

  elapsed = 0;

  if(running){
    startTime = Date.now();
  }

  timeEl.textContent = "00:00:00";
});

async function checkNotion(){

  try{

    const response = await fetch(API_URL);

    const data = await response.json();

    if(data.running){
      startTimer();
    }else{
      stopTimer();
    }

    if(data.task){
      taskEl.textContent = data.task;
    }else{
      taskEl.textContent = "作業なし";
    }

  }catch(e){

    console.log(e);

    statusEl.textContent = "接続エラー";
  }
}

checkNotion();

setInterval(checkNotion,5000);
</script>

</body>
</html>
