<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Notion Timer</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.timer{
  text-align:center;
}

#time{
  font-size:64px;
  font-weight:bold;
  letter-spacing:2px;
}

#status{
  margin-top:12px;
  font-size:14px;
  opacity:.7;
}
</style>
</head>
<body>

<div class="timer">
  <div id="time">00:00:00</div>
  <div id="status">待機中</div>
</div>

<script>
const API_URL = "https://timer-nu-one.vercel.app/api/status";

let startTime = null;
let elapsed = 0;
let interval = null;
let running = false;

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");

function format(ms) {
  const total = Math.floor(ms / 1000);

  const h = String(Math.floor(total / 3600)).padStart(2, "0");
  const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
  const s = String(total % 60).padStart(2, "0");

  return `${h}:${m}:${s}`;
}

function updateDisplay() {
  const now = Date.now();
  elapsed = now - startTime;

  timeEl.textContent = format(elapsed);
}

function startTimer() {
  if (running) return;

  running = true;

  startTime = Date.now() - elapsed;

  interval = setInterval(updateDisplay, 1000);

  statusEl.textContent = "作業中";
}

function stopTimer() {
  if (!running) return;

  running = false;

  clearInterval(interval);

  statusEl.textContent = "停止中";
}

async function checkNotion() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.running) {
      startTimer();
    } else {
      stopTimer();
    }

  } catch (e) {
    console.log(e);
    statusEl.textContent = "接続エラー";
  }
}

checkNotion();

setInterval(checkNotion, 5000);
</script>

</body>
</html>
