<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notion Timer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=MPLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#A8C9D2;
  font-family:'M PLUS Rounded 1c', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  overflow:hidden;
}

.timer{
  text-align:center;
  position:relative;
}

#task{
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
  letter-spacing:.04em;
  text-shadow:0 2px 8px rgba(0,0,0,.08);
}

#time{
  font-family:'Press Start 2P', cursive;
  font-size:56px;
  letter-spacing:2px;
  line-height:1.4;
  text-shadow:0 2px 12px rgba(0,0,0,.08);
}

#status{
  margin-top:18px;
  font-size:13px;
  opacity:.75;
  letter-spacing:.08em;
}

#reset{
  position:fixed;
  right:16px;
  bottom:16px;
  border:none;
  background:rgba(255,255,255,.15);
  color:white;
  width:32px;
  height:32px;
  border-radius:999px;
  font-size:14px;
  cursor:pointer;
  backdrop-filter:blur(4px);
  transition:.2s;
}

#reset:hover{
  background:rgba(255,255,255,.25);
}
</style>
</head>
<body>

<div class="timer">

  <div id="task">作業なし</div>

  <div id="time">00:00:00</div>

  <div id="status">待機中</div>

</div>

<button id="reset">↺</button>

<script>
const API_URL = "https://notiontimer.vercel.app/api/status";

const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");
const taskEl = document.getElementById("task");
const resetBtn = document.getElementById("reset");

let running = false;
let startTime = null;
let elapsed = 0;
let timerInterval = null;

function format(ms){

  const total = Math.floor(ms / 1000);

  const h = String(Math.floor(total / 3600)).padStart(2,"0");
  const m = String(Math.floor((total % 3600) / 60)).padStart(2,"0");
  const s = String(total % 60).padStart(2,"0");

  return `${h}:${m}:${s}`;
}

function updateTimer(){

  elapsed = Date.now() - startTime;

  timeEl.textContent = format(elapsed);
}

function startTimer(){

  if(running) return;

  running = true;

  startTime = Date.now() - elapsed;

  timerInterval = setInterval(updateTimer,1000);

  statusEl.textContent = "作業中";
}

function stopTimer(){

  if(!running) return;

  running = false;

  clearInterval(timerInterval);

  statusEl.textContent = "停止中";
}

resetBtn.addEventListener("click", () => {

  elapsed = 0;

  if(running){
    startTime = Date.now();
  }

  timeEl.textContent = "00:00:00";
});

async function checkNotion(){

  try{

    const response = await fetch(API_URL);

    const data = await response.json();

    if(data.running){
      startTimer();
    }else{
      stopTimer();
    }

    if(data.task){
      taskEl.textContent = data.task;
    }else{
      taskEl.textContent = "作業なし";
    }

  }catch(e){

    console.log(e);

    statusEl.textContent = "接続エラー";
  }
}

checkNotion();

setInterval(checkNotion,5000);
</script>

</body>
</html>
